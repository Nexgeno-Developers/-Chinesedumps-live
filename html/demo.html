    <script>
        var isLoggedIn = <?php echo isset($_SESSION['uid']) ? 'true' : 'false'; ?>;
        var baseUrl = "<?php echo BASE_URL; ?>";
        var basePath = "<?php echo rtrim(parse_url(BASE_URL, PHP_URL_PATH) ?: '/', '/'); ?>/";
    
        $(document).ready(function () {
            $('.download-demo-btn').click(function (e) {
                e.preventDefault();
                
                /*if (!isLoggedIn) {
                    alert('You need to log in to download this file.');
                    window.location.href = 'login.php';
                    return;
                }*/
                
                // Set cookie before redirecting to login
                if (!isLoggedIn) {
                    alert('You need to log in to download this file.');
                    document.cookie = "redirect_after_login=" + encodeURIComponent(window.location.href) + "; path=" + basePath;
                    window.location.href = baseUrl + 'login.php';
                    return;
                }
                
                var $btn = $(this);
                var originalHtml = $btn.html();
                var file = $btn.data('file');
                var certId = $btn.data('cert-id');
                var displayName = $btn.data('name'); // Use button name as download name
        
                $btn.text('Downloading...');
        
                $.ajax({
                    url: 'download_demo.php',
                    method: 'POST',
                    data: {
                        ajax: true,
                        file: file,
                        cert_id: certId,
                        displayName: displayName
                    },
                    xhrFields: { withCredentials: true },
                    success: function () {
                        // Get original file extension
                        var ext = file.split('.').pop(); // Extracts extension from original filename
                    
                        // Ensure displayName includes the extension
                        var finalName = displayName;
                        if (!finalName.toLowerCase().endsWith('.' + ext.toLowerCase())) {
                            finalName += '.' + ext;
                        }
                    
                        // Force download with correct name and extension
                        var link = document.createElement('a');
                        link.href = 'uploads/demo_pdfs/' + file;
                        link.download = finalName;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                    
                        $btn.html(originalHtml);
                        alert('Downloaded successfully');
                    },
                    // success: function (res) {
                    //     // Set href and download attributes to let browser handle it natively
                    //     $btn.attr('href', 'uploads/demo_pdfs/' + file);
                    //     $btn.attr('download', file);
                    //     $btn.off('click'); // remove this handler for future clicks
                    //     $btn[0].click(); // simulate click to start download
                    //     // $btn.html('Download Again <i class="fa fa-download"></i>'); // Custom success label
                    //     $btn.html(originalHtml);
                    //     alert('Downloaded successfully');
                    // },
                    error: function (xhr, status, error) {
                        console.error('AJAX Error:', {
                            status: xhr.status,
                            statusText: xhr.statusText,
                            responseText: xhr.responseText,
                            errorThrown: error
                        });
                    
                        $btn.html(originalHtml);
                    
                        if (xhr.status === 401) {
                            alert('Please login to download the file.');
                        } else {
                            console.log('Failed to log download. Server returned: ' + xhr.status + ' - ' + xhr.responseText);
                        }
                    }
                });
            });
        });
    </script>
