<style>
 .downloads-tabs {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

/* Button base */
.tab-button {
  display: flex !important;
  align-items: center;
  gap: 8px;

  padding: 10px 16px !important;
  font-size: 14px;
  font-weight: 500;
  height:auto !important;
  background-color: #ffffff;
  color: #6b7280;

  border: 1px solid transparent;
  border-radius: 10px;

  cursor: pointer;
  transition: all 0.2s ease-in-out;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
}
.tab-button p
{
    margin-bottom:0px;
    padding-bottom:0px;
}
/* Hover */
.tab-button:hover {
  background-color: #f3f4f6;
  color: #111827;
  border-color: #e5e7eb;
}

/* Active tab */
.tab-button.active {
  background-color: #3c85ba;
  color: #ffffff;
  box-shadow: 0 6px 16px rgba(37, 99, 235, 0.35);
}

/* Icon */
.tab-button .icon {
  font-size: 16px;
  display: inline-flex;
}
   
</style>

<div class="downloads-tabs">
  <a href="mydownloads.html" class="tab-button active">
    <i class="fa fa-cube"></i>
    <p>My Products</p>
  </a>

  <a href="my-testing-engine.html" class="tab-button">
    <i class="fa fa-flask"></i>
    <p>My Testing Engine</p>
  </a>

  <a href="myorders.html" class="tab-button">
    <i class="fa fa-file-text-o"></i>
    <p>Orders / Invoices</p>
  </a>

  <a href="editprofile.html" class="tab-button">
    <i class="fa fa-cog"></i>
    <p>Account Settings</p>
  </a>

  <a href="faqs.html" class="tab-button">
    <i class="fa fa-shield"></i>
    <p>Privacy Policy</p>
  </a>

  <a href="signout.html" class="tab-button">
    <i class="fa fa-sign-out"></i>
    <p>Log Out</p>
  </a>


<script>
  const currentPage = window.location.pathname.split('/').pop();

  document.querySelectorAll('.tab-button').forEach(tab => {
    const tabPage = tab.getAttribute('href');

    if (tabPage === currentPage) {
      tab.classList.add('active');
    } else {
      tab.classList.remove('active');
    }
  });
</script>
